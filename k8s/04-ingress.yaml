apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tdk-cockpit-ingress
  namespace: tdk-cockpit
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - tdksoftconsulting.de
    - www.tdksoftconsulting.de
    secretName: tdk-cockpit-tls-cert
  rules:
  - host: tdksoftconsulting.de
    http:
      paths:
      - path: /
        pathType: Prefix # Corrected: Capital P
        backend:
          service:
            name: tdk-cockpit-service
            port:
              number: 80
  - host: www.tdksoftconsulting.de
    http:
      paths:
      - path: /
        pathType: Prefix # Corrected: Capital P
        backend:
          service:
            name: tdk-cockpit-service # Corrected: Use the actual service name, not the URL
            port:
              number: 80